<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SharePoint Vault — field-tested scripts, gotchas and guides for SharePoint professionals</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Zápisky z bojového pole — notes from the battlefield. Field-tested PowerShell scripts, hard-won gotchas, guides and templates for SharePoint professionals. Maintained by the EasyPortal 365 team.">
  <meta property="og:title" content="SharePoint Vault">
  <meta property="og:description" content="Field-tested scripts, hard-won lessons, and ready-to-use templates for SharePoint professionals.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sharepointvault.online/">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗝️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* ═══ SharePoint Vault — Light Terminal theme (koncept A + mřížka) · EP365 DS tokens ═══ */
    :root {
      --navy:#002163; --navy7:#003599; --navy6:#1F4DB5;
      --teal:#00CED7; --teal6:#00BCC4; --teal7:#00A8B0;
      --bg:#FFFFFF; --bg2:#F4F7FB; --bg3:#EAEFF6;
      --line:#E0E6EF; --line2:#C7D0DC;
      --muted:#4A5874; --soft:#7A8499; --mint:#E4F7F6;
      --green:#34B36A; --amber:#E6A23C; --red:#D14343;
      --sans:'Plus Jakarta Sans',system-ui,sans-serif;
      --mono:'JetBrains Mono',Consolas,monospace;
      --serif:'Fraunces',Georgia,serif;
      --theme-color:#00A8B0;
    }
    body { font-family:var(--sans); color:var(--navy); background:#F6FAFC; }

    /* ── aurora mesh + 44px mřížka s fade (DS 10.29 / 10.23) ── */
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(760px 460px at 10% -6%, rgba(0,206,215,.13), transparent 62%),
        radial-gradient(700px 430px at 90% -10%, rgba(0,33,99,.06), transparent 62%),
        radial-gradient(860px 520px at 50% 110%, rgba(0,168,176,.09), transparent 62%);
    }
    body::after {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,33,99,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,33,99,.045) 1px, transparent 1px);
      background-size:44px 44px;
      -webkit-mask-image:radial-gradient(ellipse at 50% 0%, #000 22%, transparent 70%);
      mask-image:radial-gradient(ellipse at 50% 0%, #000 22%, transparent 70%);
    }
    main { position:relative; z-index:1; }

    /* ── sidebar ── */
    .sidebar { background:rgba(251,252,254,.92); backdrop-filter:blur(10px); border-right:1px solid var(--line); color:var(--muted); }
    .sidebar > h1 { margin:0 auto .5rem; padding:6px 0 14px; border-bottom:1px solid var(--line); }
    .sidebar > h1 a { font-family:var(--mono); font-weight:700; font-size:15.5px; letter-spacing:-.02em; color:var(--navy); }
    .sidebar > h1 a b { color:var(--teal7); }
    .sidebar > h1 a i { font-style:normal; color:var(--soft); font-weight:400; }
    .sidebar ul li a { font-family:var(--mono); font-size:12.5px; color:var(--muted); }
    .sidebar ul li a:hover { color:var(--teal7); text-decoration:none; }
    .sidebar ul li.active > a { color:var(--navy); font-weight:700; background:var(--mint); border-radius:8px; border-right:none; }
    .sidebar ul li.active > a::before { content:'> '; color:var(--teal7); }
    .sidebar-nav > ul > li > p { margin:.35em 0; }
    .sidebar-nav li > p > strong { font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--soft); font-weight:700; display:block; margin-top:.9em; }
    .sidebar::-webkit-scrollbar { width:4px; } .sidebar::-webkit-scrollbar-thumb { background:var(--line2); }
    .sidebar-toggle { background:transparent; }
    .sidebar-toggle span { background-color:var(--teal7); }

    /* ── search plugin ── */
    .search { border-bottom:1px solid var(--line); padding:6px 14px 12px; }
    .search input { font-family:var(--mono); font-size:12px; background:var(--bg); border:1px solid var(--line); border-radius:999px; padding:8px 14px; color:var(--navy); }
    .search input:focus { border-color:var(--teal6); box-shadow:0 0 0 3px rgba(0,206,215,.15); }
    .search .results-panel h2 { font-family:var(--mono); font-size:13px; color:var(--navy); }
    .search .matching-post { border-bottom:1px solid var(--line); }

    /* ── content ── */
    .content { padding-bottom:52px; }
    .markdown-section { max-width:860px; font-size:15px; line-height:1.75; color:#22315a; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 { font-family:var(--mono); color:var(--navy); letter-spacing:-.02em; font-weight:700; }
    .markdown-section h1 { font-size:30px; }
    .markdown-section h2 { font-size:21px; margin-top:2.4em; padding-top:1em; border-top:1px dashed var(--line2); }
    .markdown-section h2::before { content:'## '; color:var(--teal7); font-weight:700; }
    .markdown-section h3 { font-size:16.5px; }
    .markdown-section h3::before { content:'>_ '; color:var(--teal7); }
    .markdown-section a { color:var(--teal7); font-weight:600; text-decoration:none; border-bottom:1px solid rgba(0,168,176,.35); }
    .markdown-section a:hover { color:var(--teal6); border-bottom-color:var(--teal6); }
    .markdown-section strong { color:var(--navy); }
    .markdown-section em { font-family:var(--serif); font-style:italic; color:var(--teal7); }
    .markdown-section blockquote { border-left:3px solid var(--teal); background:rgba(228,247,246,.55); border-radius:0 10px 10px 0; padding:2px 18px; color:var(--muted); }
    .markdown-section blockquote p { font-size:14px; }
    .markdown-section hr { border:none; border-top:1px dashed var(--line2); }
    .markdown-section img { max-width:100%; border-radius:10px; }

    /* inline code */
    .markdown-section code { font-family:var(--mono); font-size:.86em; background:var(--bg2); border:1px solid var(--line); border-radius:6px; color:#0a5d61; padding:2px 6px; }

    /* ── code blocks = terminal windows ── */
    .markdown-section pre { position:relative; background:rgba(255,255,255,.9); border:1px solid rgba(0,33,99,.10); border-radius:12px; box-shadow:0 10px 26px -18px rgba(0,33,99,.30); padding:44px 0 6px; margin:1.4em 0; }
    .markdown-section pre::before {
      content:''; position:absolute; top:13px; left:16px; width:11px; height:11px; border-radius:50%;
      background:var(--red); box-shadow:19px 0 0 var(--amber), 38px 0 0 var(--green);
    }
    .markdown-section pre::after { content:attr(data-lang); position:absolute; top:9px; right:14px; font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--soft); }
    .markdown-section pre > code { font-family:var(--mono); font-size:12.8px; line-height:1.75; background:transparent; color:#1c2c55; padding:0 22px 14px; }
    .token.comment { color:var(--soft); font-style:italic; }
    .token.keyword, .token.selector, .token.rule { color:var(--navy6); font-weight:700; }
    .token.string, .token.attr-value, .token.url { color:var(--teal7); }
    .token.function { color:#0a6bd6; }
    .token.number, .token.boolean { color:#B25E09; }
    .token.operator, .token.punctuation { color:#5b6a8c; }
    .token.property, .token.attr-name, .token.variable { color:#0a5d61; }
    .docsify-copy-code-button { font-family:var(--mono) !important; font-size:10px !important; background:var(--navy) !important; border-radius:6px !important; }

    /* ── tables ── */
    .markdown-section table { display:block; overflow-x:auto; border-radius:12px; border:1px solid var(--line); box-shadow:0 6px 18px -16px rgba(0,33,99,.3); }
    .markdown-section th { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; background:var(--bg2); color:var(--muted); border:none; border-bottom:1px solid var(--line2); padding:10px 14px; }
    .markdown-section td { border:none; border-bottom:1px solid var(--line); font-size:13.5px; padding:10px 14px; }
    .markdown-section tr:last-child td { border-bottom:none; }
    .markdown-section tr:nth-child(2n) { background:rgba(244,247,251,.5); }

    /* ── link lists → terminal tree (méně wiki) ── */
    .markdown-section ul:not(.sv-links) > li::marker { color:var(--teal7); }
    .markdown-section ul.sv-links { list-style:none; padding-left:2px; }
    .markdown-section ul.sv-links ul { list-style:none; padding-left:16px; margin:2px 0 2px 9px; border-left:1px dashed var(--line2); }
    .markdown-section ul.sv-links li { margin:0; }
    .markdown-section li.sv-link { padding:7px 12px; border-radius:8px; line-height:1.55; }
    .markdown-section li.sv-link:hover { background:rgba(228,247,246,.65); }
    .markdown-section li.sv-link a { font-family:var(--mono); font-size:13px; border-bottom:none; }
    .markdown-section li.sv-link a:hover { text-decoration:underline; text-underline-offset:3px; }
    .markdown-section li.sv-group { padding:4px 12px 2px; }
    .markdown-section li.sv-group > strong { font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--soft); font-weight:700; }
    .markdown-section > ul.sv-links > li.sv-link { margin-top:18px; padding:9px 12px; background:rgba(255,255,255,.8); border:1px solid var(--line); border-radius:10px; box-shadow:0 5px 16px -14px rgba(0,33,99,.35); }
    .markdown-section > ul.sv-links > li.sv-link a { font-size:14.5px; font-weight:700; }
    .markdown-section > ul.sv-links > li.sv-link:hover { background:rgba(255,255,255,.95); }

    /* ── hero terminal (home only, injected) ── */
    .sv-hero { max-width:860px; margin:6px 0 34px; background:rgba(255,255,255,.9); backdrop-filter:blur(14px); border:1px solid rgba(0,33,99,.10); border-radius:14px; box-shadow:0 14px 38px -18px rgba(0,33,99,.30); overflow:hidden; }
    .sv-hero .bar { display:flex; align-items:center; gap:7px; padding:11px 16px; border-bottom:1px solid var(--line); background:rgba(244,247,251,.75); }
    .sv-hero .bar i { width:11px; height:11px; border-radius:50%; }
    .sv-hero .bar i:nth-child(1){background:var(--red)} .sv-hero .bar i:nth-child(2){background:var(--amber)} .sv-hero .bar i:nth-child(3){background:var(--green)}
    .sv-hero .bar span { font-family:var(--mono); font-size:11px; color:var(--soft); margin-left:8px; }
    .sv-hero .body { padding:24px 28px 26px; font-family:var(--mono); font-size:13.5px; line-height:1.9; }
    .sv-hero .p { color:var(--teal7); font-weight:700; }
    .sv-hero .cmd { color:var(--navy); font-weight:500; }
    .sv-hero .out { color:var(--muted); }
    .sv-hero .hl { color:var(--teal7); }
    .sv-hero h1 { font-family:var(--mono) !important; font-size:31px !important; font-weight:700; letter-spacing:-.03em; margin:10px 0 2px !important; color:var(--navy); }
    .sv-hero h1 .tick { color:var(--teal); }
    .sv-hero .sub { font-family:var(--serif); font-style:italic; color:var(--teal7); font-size:16px; margin:2px 0 12px; }
    .sv-hero .cursor { display:inline-block; width:9px; height:17px; background:var(--teal); vertical-align:-3px; animation:svblink 1.1s steps(1) infinite; }
    @keyframes svblink { 50% { opacity:0 } }
    .sv-hero .ok { color:var(--green); font-weight:700; }
    .is-home .markdown-section > div[align="center"] { display:none; }
    .is-home .markdown-section > div[align="center"] + hr { display:none; }

    /* ── status bar ── */
    .sv-status { position:fixed; left:0; right:0; bottom:0; z-index:20; background:var(--navy); color:#fff; font-family:var(--mono); font-size:11px; letter-spacing:.04em; display:flex; gap:24px; padding:7px 18px 7px 320px; }
    .sv-status .ok { color:#5FE3DC; }
    .sv-status .right { margin-left:auto; }
    .sv-status a { color:#9BEFE7; text-decoration:none; }
    @media (max-width:768px){ .sv-status { padding-left:18px; } .sv-status .hide-m { display:none; } }

    /* app name pill + GitHub corner untouched (docsify) */
    .github-corner svg { fill:var(--teal7); }
    @media (max-width:768px){ body::after { background-size:34px 34px; } .markdown-section { font-size:14.5px; } }
  </style>
</head>
<body>
  <div id="app">Opening the vault…</div>
  <div class="sv-status">
    <span class="ok">● main</span>
    <span class="hide-m">symptom → cause → fix</span>
    <span class="hide-m">MIT · maintained by <a href="https://www.easyportal365.com" target="_blank" rel="noopener">EasyPortal 365</a></span>
    <span class="right"><a href="https://github.com/EasyPortal365/sharepoint-vault" target="_blank" rel="noopener">github.com/EasyPortal365/sharepoint-vault</a></span>
  </div>
  <script>
    var SV_HERO =
      '<div class="sv-hero">' +
        '<div class="bar"><i></i><i></i><i></i><span>spvault — battlefield session — 80×24</span></div>' +
        '<div class="body">' +
          '<div><span class="p">PS SPVault:\\&gt;</span> <span class="cmd">Get-Help .\\SharePoint.psm1 -Full</span></div>' +
          '<h1>SharePoint Vault<span class="tick">_</span></h1>' +
          '<div class="sub">„Zápisky z bojového pole“ — notes from the battlefield.</div>' +
          '<div class="out">Field-tested scripts, hard-won gotchas and guides for SharePoint professionals.<br>No marketing. No doc rewrites. Only things that <span class="hl">survived contact with production</span>.</div>' +
          '<div style="margin-top:14px"><span class="p">PS SPVault:\\&gt;</span> <span class="cmd">Get-Vault | Format-Table</span></div>' +
          '<div class="out">gotchas&nbsp;&nbsp;guides&nbsp;&nbsp;scripts&nbsp;&nbsp;snippets&nbsp;&nbsp;templates&nbsp;&nbsp;resources&nbsp;&nbsp;<span class="ok">[all field-tested ✓]</span></div>' +
          '<div style="margin-top:14px"><span class="p">PS SPVault:\\&gt;</span> <span class="cursor"></span></div>' +
        '</div>' +
      '</div>';

    window.$docsify = {
      name: 'SharePoint<b>Vault</b> <i>~$</i>',
      repo: 'EasyPortal365/sharepoint-vault',
      homepage: 'README.md',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 2,
      auto2top: true,
      maxLevel: 3,
      search: {
        placeholder: 'search the vault…',
        noData: 'Nothing found — try a different term.',
        depth: 3
      },
      frontMatter: {},
      plugins: [
        function (hook, vm) {
          hook.afterEach(function (html, next) {
            if (vm.route.path === '/') { next(SV_HERO + html); } else { next(html); }
          });
          hook.doneEach(function () {
            document.body.classList.toggle('is-home', vm.route.path === '/');
            // klasifikace seznamů: položky začínající odkazem → terminal tree místo wiki bulletů
            var lis = document.querySelectorAll('.markdown-section li');
            for (var i = 0; i < lis.length; i++) {
              var li = lis[i];
              var a = li.querySelector(':scope > a, :scope > strong > a, :scope > em > a');
              if (a) {
                var idx = (li.textContent || '').indexOf(a.textContent || '');
                if (idx > -1 && idx <= 4) { li.classList.add('sv-link'); }
              } else {
                var st = li.querySelector(':scope > strong');
                var hasSub = li.querySelector(':scope > ul');
                if (st && hasSub && st.textContent.length < 40) { li.classList.add('sv-group'); }
              }
            }
            var uls = document.querySelectorAll('.markdown-section ul');
            for (var u = 0; u < uls.length; u++) {
              var kids = uls[u].children, hit = 0, tot = 0;
              for (var k = 0; k < kids.length; k++) {
                if (kids[k].tagName === 'LI') { tot++; if (kids[k].classList.contains('sv-link') || kids[k].classList.contains('sv-group')) { hit++; } }
              }
              if (tot > 0 && hit / tot >= 0.6) { uls[u].classList.add('sv-links'); }
            }
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/front-matter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-tsx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-jsx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-powershell.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-http.min.js"></script>
</body>
</html>
